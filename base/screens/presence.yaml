interval:
  # Carousel nav: when selected, show the page, take the knob, lay out the avatars.
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==9;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_pr_moving) = false;'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_presence, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_presence, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_presence, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_presence, animation: move_bottom, time: 250ms }] }
            - script.execute: pr_buildlist
            - script.execute: pr_place
            - script.execute: pr_center
  # Smooth rotation: ease g_pr_pos toward g_pr_target (~30 fps) and reposition while moving.
  - interval: 33ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==9 && id(g_pr_moving) && id(g_pr_n) > 0;' }
          then:
            - lambda: |-
                float d = id(g_pr_target) - id(g_pr_pos);
                if (fabsf(d) < 0.02f) {
                  int n = id(g_pr_n);
                  float t = fmodf(id(g_pr_target), (float) n); if (t < 0) t += n;
                  id(g_pr_target) = t; id(g_pr_pos) = t;
                  id(g_pr_sel) = ((int) lroundf(t)) % n;
                  id(g_pr_moving) = false;
                } else {
                  id(g_pr_pos) += d * 0.30f;
                }
            - script.execute: pr_place
            - if:
                condition: { lambda: 'return !id(g_pr_moving);' }
                then: [ script.execute: pr_center ]
  # Knob rotates the carousel (one person per detent); capture only when there's more than one.
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==9;' }
          then:
            - lambda: 'id(g_knob_capture) = (id(g_pr_n) > 1);'
            - if:
                condition: { lambda: 'return id(g_knob_delta) != 0 && id(g_pr_n) > 1;' }
                then:
                  - lambda: 'id(g_pr_target) += (float) id(g_knob_delta); id(g_knob_delta) = 0; id(g_pr_moving) = true;'

lvgl:
  pages:
    - id: page_presence
      bg_color: 0x0B1020
      widgets:
        # ring avatars (positions set in pr_place); each person's chosen avatar is bound at compile time
        - image:
            id: pr_p0
            align: CENTER
            x: 0
            y: -116
            hidden: true
            src: pr_avatar${person1_avatar}
        - image:
            id: pr_p1
            align: CENTER
            x: 0
            y: -116
            hidden: true
            src: pr_avatar${person2_avatar}
        - image:
            id: pr_p2
            align: CENTER
            x: 0
            y: -116
            hidden: true
            src: pr_avatar${person3_avatar}
        - image:
            id: pr_p3
            align: CENTER
            x: 0
            y: -116
            hidden: true
            src: pr_avatar${person4_avatar}
        - image:
            id: pr_p4
            align: CENTER
            x: 0
            y: -116
            hidden: true
            src: pr_avatar${person5_avatar}
        - image:
            id: pr_p5
            align: CENTER
            x: 0
            y: -116
            hidden: true
            src: pr_avatar${person6_avatar}
        # highlight ring around the top (selected) slot
        - obj: { id: pr_selring, align: CENTER, x: 0, y: -116, width: 96, height: 96, radius: 48, bg_opa: TRANSP, border_width: 3, border_color: 0x35C759, hidden: true }
        # centre: name + location
        - label: { id: pr_name, align: CENTER, y: 14, text: "", text_font: font_sel, text_color: 0xFFFFFF }
        - label: { id: pr_loc, align: CENTER, y: 52, text: "", text_font: font_med, text_color: 0x35C759 }
        - label: { id: pr_empty, align: CENTER, text: "Set person entities", text_font: font_med, text_color: 0x466761, hidden: true }
