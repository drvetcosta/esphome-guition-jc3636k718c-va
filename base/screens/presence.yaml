# Presence ("who's home") - optional carousel screen (base id 9, carousel name "presence").
# A rotating person dial: each person.* sits on a ring of cartoon avatars; turn the KNOB and the
# carousel smoothly slides so the selected person rotates to the TOP (highlighted), with their name
# and location (Home / zone / Away, colour-coded) in the centre.
#
# Avatars are baked in at COMPILE time (DiceBear "ToonHead" by Johan Melin, CC BY 4.0) - NO runtime
# downloads, so it stays fast. Pick one of the 24 per person with personN_avatar (1..24). Configure
# personN_entity / personN_name. Remove the screen by dropping this file from the "files:" list.

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: |-
            id(g_present)[9] = true;
            const char* nm[6] = { "${person1_name}","${person2_name}","${person3_name}","${person4_name}","${person5_name}","${person6_name}" };
            for (int i = 0; i < 6; i++) id(g_pr_name)[i] = nm[i];

globals:
  - id: g_pr_state      # person state: home / not_home / zone name
    type: std::string[6]
    restore_value: no
  - id: g_pr_name
    type: std::string[6]
    restore_value: no
  - id: g_pr_present    # got a state from HA
    type: bool[6]
    restore_value: no
  - id: g_pr_list       # present person index per ring slot (0..n-1)
    type: int[6]
    restore_value: no
  - id: g_pr_n
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_pr_sel        # selected ring slot
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_pr_pos        # eased ring position (animated)
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_pr_target     # target ring position (set by the knob)
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_pr_moving
    type: bool
    restore_value: no
    initial_value: 'false'

