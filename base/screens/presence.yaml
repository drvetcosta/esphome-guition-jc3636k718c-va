  - platform: homeassistant
    id: pr_s0
    entity_id: ${person1_entity}
    on_value: [ lambda: 'id(g_pr_state)[0]=x; id(g_pr_present)[0]=true;', script.execute: pr_buildlist, script.execute: pr_place, script.execute: pr_center ]
  - platform: homeassistant
    id: pr_s1
    entity_id: ${person2_entity}
    on_value: [ lambda: 'id(g_pr_state)[1]=x; id(g_pr_present)[1]=true;', script.execute: pr_buildlist, script.execute: pr_place, script.execute: pr_center ]
  - platform: homeassistant
    id: pr_s2
    entity_id: ${person3_entity}
    on_value: [ lambda: 'id(g_pr_state)[2]=x; id(g_pr_present)[2]=true;', script.execute: pr_buildlist, script.execute: pr_place, script.execute: pr_center ]
