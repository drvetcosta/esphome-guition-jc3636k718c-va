script:
  - id: pr_buildlist      # rebuild the present-person ring list
    then:
      - lambda: |-
          id(g_pr_n) = 0;
          for (int p = 0; p < 6; p++) if (id(g_pr_present)[p]) id(g_pr_list)[id(g_pr_n)++] = p;
          if (id(g_pr_n) > 0) {
            if (id(g_pr_sel) >= id(g_pr_n)) id(g_pr_sel) = 0;
            id(g_pr_target) = id(g_pr_sel); id(g_pr_pos) = id(g_pr_sel);
          }
  - id: pr_center         # centre name + location + highlight colour for the selected person
    then:
      - if:
          condition: { lambda: 'return id(g_pr_n) <= 0;' }
          then:
            - lvgl.widget.show: pr_empty
            - lvgl.widget.hide: pr_name
            - lvgl.widget.hide: pr_loc
            - lvgl.widget.hide: pr_selring
          else:
            - lvgl.widget.hide: pr_empty
            - lvgl.widget.show: pr_name
            - lvgl.widget.show: pr_loc
            - lvgl.widget.show: pr_selring
            - lvgl.label.update: { id: pr_name, text: !lambda 'return id(g_pr_name)[id(g_pr_list)[id(g_pr_sel)]];' }
            - lvgl.label.update:
                id: pr_loc
                text: !lambda |-
                  std::string s = id(g_pr_state)[id(g_pr_list)[id(g_pr_sel)]];
                  if (s == "home") return std::string("Home");
                  if (s == "not_home" || s.empty()) return std::string("Away");
                  if (s[0] >= 'a' && s[0] <= 'z') s[0] -= 32;
                  return s;
            - if:
                condition: { lambda: 'return id(g_pr_state)[id(g_pr_list)[id(g_pr_sel)]] == "home";' }
                then:
                  - lvgl.label.update: { id: pr_loc, text_color: 0x35C759 }
                  - lvgl.widget.update: { id: pr_selring, border_color: 0x35C759 }
                else:
                  - if:
                      condition: { lambda: 'std::string s=id(g_pr_state)[id(g_pr_list)[id(g_pr_sel)]]; return s=="not_home" || s.empty();' }
                      then:
                        - lvgl.label.update: { id: pr_loc, text_color: 0x6F9A92 }
                        - lvgl.widget.update: { id: pr_selring, border_color: 0x3A3A3D }
                      else:
                        - lvgl.label.update: { id: pr_loc, text_color: 0xFFB020 }
                        - lvgl.widget.update: { id: pr_selring, border_color: 0xFFB020 }
  - id: pr_place          # position the avatars around the ring from g_pr_pos (R=116)
    then:
      - lvgl.widget.update: { id: pr_p0, hidden: !lambda 'return !id(g_pr_present)[0];', x: !lambda 'int n=id(g_pr_n); if(n<1)return 0; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==0){r=k;break;} if(r<0)return 0; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(116.0f*sinf(o*6.2831853f/n));', y: !lambda 'int n=id(g_pr_n); if(n<1)return -116; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==0){r=k;break;} if(r<0)return -116; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(-116.0f*cosf(o*6.2831853f/n));' }
      - lvgl.widget.update: { id: pr_p1, hidden: !lambda 'return !id(g_pr_present)[1];', x: !lambda 'int n=id(g_pr_n); if(n<1)return 0; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==1){r=k;break;} if(r<0)return 0; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(116.0f*sinf(o*6.2831853f/n));', y: !lambda 'int n=id(g_pr_n); if(n<1)return -116; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==1){r=k;break;} if(r<0)return -116; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(-116.0f*cosf(o*6.2831853f/n));' }
      - lvgl.widget.update: { id: pr_p2, hidden: !lambda 'return !id(g_pr_present)[2];', x: !lambda 'int n=id(g_pr_n); if(n<1)return 0; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==2){r=k;break;} if(r<0)return 0; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(116.0f*sinf(o*6.2831853f/n));', y: !lambda 'int n=id(g_pr_n); if(n<1)return -116; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==2){r=k;break;} if(r<0)return -116; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(-116.0f*cosf(o*6.2831853f/n));' }
      - lvgl.widget.update: { id: pr_p3, hidden: !lambda 'return !id(g_pr_present)[3];', x: !lambda 'int n=id(g_pr_n); if(n<1)return 0; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==3){r=k;break;} if(r<0)return 0; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(116.0f*sinf(o*6.2831853f/n));', y: !lambda 'int n=id(g_pr_n); if(n<1)return -116; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==3){r=k;break;} if(r<0)return -116; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(-116.0f*cosf(o*6.2831853f/n));' }
      - lvgl.widget.update: { id: pr_p4, hidden: !lambda 'return !id(g_pr_present)[4];', x: !lambda 'int n=id(g_pr_n); if(n<1)return 0; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==4){r=k;break;} if(r<0)return 0; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(116.0f*sinf(o*6.2831853f/n));', y: !lambda 'int n=id(g_pr_n); if(n<1)return -116; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==4){r=k;break;} if(r<0)return -116; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(-116.0f*cosf(o*6.2831853f/n));' }
      - lvgl.widget.update: { id: pr_p5, hidden: !lambda 'return !id(g_pr_present)[5];', x: !lambda 'int n=id(g_pr_n); if(n<1)return 0; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==5){r=k;break;} if(r<0)return 0; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(116.0f*sinf(o*6.2831853f/n));', y: !lambda 'int n=id(g_pr_n); if(n<1)return -116; int r=-1; for(int k=0;k<n;k++) if(id(g_pr_list)[k]==5){r=k;break;} if(r<0)return -116; float o=r-id(g_pr_pos); while(o>n/2.0f)o-=n; while(o<-n/2.0f)o+=n; return (int)lroundf(-116.0f*cosf(o*6.2831853f/n));' }

