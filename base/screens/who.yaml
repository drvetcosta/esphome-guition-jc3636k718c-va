text_sensor:
  - platform: homeassistant
    id: who_s0
    entity_id: ${person1_entity}
    on_value: [ lambda: 'id(g_who_state)[0]=x; id(g_who_present)[0]=true;', script.execute: who_render ]
  - platform: homeassistant
    id: who_p0
    entity_id: ${person1_entity}
    attribute: entity_picture
    on_value: [ lambda: 'std::string u=x; if(!u.empty() && u.rfind("http",0)!=0) u=std::string("${ha_base_url}")+u; if(id(g_who_custom)[0]) return; id(g_who_pic)[0]=u; id(g_who_haspic)[0]=!u.empty(); if(!u.empty()){ id(who_img0)->set_url(u.c_str()); id(who_img0)->update(); }', script.execute: who_render ]
  - platform: homeassistant
    id: who_s1
    entity_id: ${person2_entity}
    on_value: [ lambda: 'id(g_who_state)[1]=x; id(g_who_present)[1]=true;', script.execute: who_render ]
  - platform: homeassistant
    id: who_p1
    entity_id: ${person2_entity}
    attribute: entity_picture
    on_value: [ lambda: 'std::string u=x; if(!u.empty() && u.rfind("http",0)!=0) u=std::string("${ha_base_url}")+u; if(id(g_who_custom)[1]) return; id(g_who_pic)[1]=u; id(g_who_haspic)[1]=!u.empty(); if(!u.empty()){ id(who_img1)->set_url(u.c_str()); id(who_img1)->update(); }', script.execute: who_render ]
