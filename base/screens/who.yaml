  - platform: homeassistant
    id: who_s4
    entity_id: ${person5_entity}
    on_value: [ lambda: 'id(g_who_state)[4]=x; id(g_who_present)[4]=true;', script.execute: who_render ]
  - platform: homeassistant
    id: who_p4
    entity_id: ${person5_entity}
    attribute: entity_picture
    on_value: [ lambda: 'std::string u=x; if(!u.empty() && u.rfind("http",0)!=0) u=std::string("${ha_base_url}")+u; if(id(g_who_custom)[4]) return; id(g_who_pic)[4]=u; id(g_who_haspic)[4]=!u.empty(); if(!u.empty()){ id(who_img4)->set_url(u.c_str()); id(who_img4)->update(); }', script.execute: who_render ]
