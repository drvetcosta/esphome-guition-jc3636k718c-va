# Who's home - optional carousel screen (base id 9).
# A circular "person dial": each household member (person.*) sits on a ring; turn the KNOB to
# rotate the carousel so the selected person comes to the TOP and is enlarged, with their name
# in the centre and their location below (Home / zone / Away, colour-coded). Avatars are the
# HA entity_picture (fetched like album art); people without a picture fall back to an initial.
#
# Configure up to 6 people with personN_entity / personN_name; leave a slot at its default
# (a non-existent person) and it's skipped. Remove the screen by dropping this file.

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: |-
            id(g_present)[9] = true;
            const char* nm[6] = { "${person1_name}", "${person2_name}", "${person3_name}", "${person4_name}", "${person5_name}", "${person6_name}" };
            for (int i = 0; i < 6; i++) {
              id(g_who_name)[i] = nm[i];
              std::string s = nm[i];
              std::string in = s.empty() ? std::string("?") : s.substr(0, 1);
              if (!in.empty() && in[0] >= 'a' && in[0] <= 'z') in[0] -= 32;
              id(g_who_initial)[i] = in;
            }
            const char* av[6] = { "${person1_avatar_url}", "${person2_avatar_url}", "${person3_avatar_url}", "${person4_avatar_url}", "${person5_avatar_url}", "${person6_avatar_url}" };
            for (int i = 0; i < 6; i++) {
              std::string u = av[i];
              id(g_who_custom)[i] = !u.empty();
              if (!u.empty()) {
                if (u.rfind("http", 0) != 0) u = std::string("${ha_base_url}") + u;
                id(g_who_pic)[i] = u; id(g_who_haspic)[i] = true;   // custom URL overrides the HA photo
              }
            }

globals:
  - id: g_who_state
    type: std::string[6]
    restore_value: no
  - id: g_who_pic        # entity_picture URL (absolute)
    type: std::string[6]
    restore_value: no
  - id: g_who_name
    type: std::string[6]
    restore_value: no
  - id: g_who_initial
    type: std::string[6]
    restore_value: no
  - id: g_who_present    # got a state from HA
    type: bool[6]
    restore_value: no
  - id: g_who_haspic     # entity_picture present
    type: bool[6]
    restore_value: no
  - id: g_who_custom     # a personN_avatar_url override was given (ignore the HA picture)
    type: bool[6]
    restore_value: no
  - id: g_who_loaded     # custom avatar already fetched
    type: bool[6]
    restore_value: no
  - id: g_who_sel        # selected person (shown big at top)
    type: int
    restore_value: no
    initial_value: '0'

# 6 ring avatars + 1 big (focused) avatar. Small footprint (PSRAM), like album art.
online_image:
  - { id: who_img0, url: "http://x/", format: PNG, type: RGB565, resize: 64x64, on_download_finished: [lvgl.image.update: { id: who_ph0, src: who_img0 }] }
  - { id: who_img1, url: "http://x/", format: PNG, type: RGB565, resize: 64x64, on_download_finished: [lvgl.image.update: { id: who_ph1, src: who_img1 }] }
  - { id: who_img2, url: "http://x/", format: PNG, type: RGB565, resize: 64x64, on_download_finished: [lvgl.image.update: { id: who_ph2, src: who_img2 }] }
  - { id: who_img3, url: "http://x/", format: PNG, type: RGB565, resize: 64x64, on_download_finished: [lvgl.image.update: { id: who_ph3, src: who_img3 }] }
  - { id: who_img4, url: "http://x/", format: PNG, type: RGB565, resize: 64x64, on_download_finished: [lvgl.image.update: { id: who_ph4, src: who_img4 }] }
  - { id: who_img5, url: "http://x/", format: PNG, type: RGB565, resize: 64x64, on_download_finished: [lvgl.image.update: { id: who_ph5, src: who_img5 }] }
  - { id: who_big,  url: "http://x/", format: PNG, type: RGB565, resize: 96x96, on_download_finished: [lvgl.image.update: { id: who_bigph, src: who_big }] }

script:
  - id: who_load_big      # point the big avatar at the focused person's picture
    then:
      - lambda: |-
          int s = id(g_who_sel);
          if (s >= 0 && s < 6 && id(g_who_haspic)[s] && !id(g_who_pic)[s].empty()) {
            id(who_big)->set_url(id(g_who_pic)[s].c_str());
            id(who_big)->update();
          }
  - id: who_load_custom   # fetch any custom personN_avatar_url avatars (once each)
    then:
      - lambda: |-
          if (id(g_who_custom)[0] && !id(g_who_loaded)[0] && !id(g_who_pic)[0].empty()) { id(who_img0)->set_url(id(g_who_pic)[0].c_str()); id(who_img0)->update(); id(g_who_loaded)[0] = true; }
          if (id(g_who_custom)[1] && !id(g_who_loaded)[1] && !id(g_who_pic)[1].empty()) { id(who_img1)->set_url(id(g_who_pic)[1].c_str()); id(who_img1)->update(); id(g_who_loaded)[1] = true; }
          if (id(g_who_custom)[2] && !id(g_who_loaded)[2] && !id(g_who_pic)[2].empty()) { id(who_img2)->set_url(id(g_who_pic)[2].c_str()); id(who_img2)->update(); id(g_who_loaded)[2] = true; }
          if (id(g_who_custom)[3] && !id(g_who_loaded)[3] && !id(g_who_pic)[3].empty()) { id(who_img3)->set_url(id(g_who_pic)[3].c_str()); id(who_img3)->update(); id(g_who_loaded)[3] = true; }
          if (id(g_who_custom)[4] && !id(g_who_loaded)[4] && !id(g_who_pic)[4].empty()) { id(who_img4)->set_url(id(g_who_pic)[4].c_str()); id(who_img4)->update(); id(g_who_loaded)[4] = true; }
          if (id(g_who_custom)[5] && !id(g_who_loaded)[5] && !id(g_who_pic)[5].empty()) { id(who_img5)->set_url(id(g_who_pic)[5].c_str()); id(who_img5)->update(); id(g_who_loaded)[5] = true; }
  - id: who_render
    then:
      - script.execute: who_load_custom
      - lambda: |-
          // ensure selection is on a present person
          int n = 0, first = -1;
          for (int i = 0; i < 6; i++) if (id(g_who_present)[i]) { n++; if (first < 0) first = i; }
          if (n > 0 && !id(g_who_present)[id(g_who_sel)]) id(g_who_sel) = first;
      # empty state
      - if:
          condition: { lambda: 'int n=0; for(int i=0;i<6;i++) if(id(g_who_present)[i]) n++; return n==0;' }
          then:
            - lvgl.widget.show: who_empty
            - lvgl.widget.hide: who_name
            - lvgl.widget.hide: who_loc
            - lvgl.widget.hide: who_bigph
            - lvgl.widget.hide: who_bigini
            - lvgl.widget.hide: who_bigring
          else:
            - lvgl.widget.hide: who_empty
            - lvgl.widget.show: who_name
            - lvgl.widget.show: who_loc
            - lvgl.widget.show: who_bigring
            # centre: focused name + location (colour by state)
            - lvgl.label.update: { id: who_name, text: !lambda 'return id(g_who_name)[id(g_who_sel)];' }
            - lvgl.label.update:
                id: who_loc
                text: !lambda |-
                  std::string s = id(g_who_state)[id(g_who_sel)];
                  if (s == "home") return std::string("Home");
                  if (s == "not_home" || s.empty()) return std::string("Away");
                  if (!s.empty() && s[0] >= 'a' && s[0] <= 'z') s[0] -= 32;
                  return s;
            - if:
                condition: { lambda: 'return id(g_who_state)[id(g_who_sel)] == "home";' }
                then:
                  - lvgl.label.update: { id: who_loc, text_color: 0x35C759 }
                  - lvgl.widget.update: { id: who_bigring, border_color: 0x35C759 }
                else:
                  - if:
                      condition: { lambda: 'std::string s=id(g_who_state)[id(g_who_sel)]; return s=="not_home" || s.empty();' }
                      then:
                        - lvgl.label.update: { id: who_loc, text_color: 0x6F9A92 }
                        - lvgl.widget.update: { id: who_bigring, border_color: 0x3A3A3D }
                      else:
                        - lvgl.label.update: { id: who_loc, text_color: 0xFFB020 }
                        - lvgl.widget.update: { id: who_bigring, border_color: 0xFFB020 }
            # big focused avatar: photo or initials
            - if:
                condition: { lambda: 'return id(g_who_haspic)[id(g_who_sel)];' }
                then:
                  - lvgl.widget.show: who_bigph
                  - lvgl.widget.hide: who_bigini
                else:
                  - lvgl.widget.hide: who_bigph
                  - lvgl.widget.show: who_bigini
                  - lvgl.label.update: { id: who_bigini_l, text: !lambda 'return id(g_who_initial)[id(g_who_sel)];' }
            # ring: the OTHER present people spread around (selected hides under the big avatar).
            # Positions via lvgl.widget.update x/y (relative to CENTER), like the weather dial.
            - lvgl.widget.update: { id: who_ph0, hidden: !lambda 'return !(id(g_who_present)[0] && 0!=id(g_who_sel) && id(g_who_haspic)[0]);',  x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(0-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(0-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.widget.update: { id: who_ci0, hidden: !lambda 'return !(id(g_who_present)[0] && 0!=id(g_who_sel) && !id(g_who_haspic)[0]);', x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(0-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(0-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.label.update: { id: who_in0, text: !lambda 'return id(g_who_initial)[0];' }
            - lvgl.widget.update: { id: who_ph1, hidden: !lambda 'return !(id(g_who_present)[1] && 1!=id(g_who_sel) && id(g_who_haspic)[1]);',  x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(1-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(1-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.widget.update: { id: who_ci1, hidden: !lambda 'return !(id(g_who_present)[1] && 1!=id(g_who_sel) && !id(g_who_haspic)[1]);', x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(1-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(1-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.label.update: { id: who_in1, text: !lambda 'return id(g_who_initial)[1];' }
            - lvgl.widget.update: { id: who_ph2, hidden: !lambda 'return !(id(g_who_present)[2] && 2!=id(g_who_sel) && id(g_who_haspic)[2]);',  x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(2-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(2-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.widget.update: { id: who_ci2, hidden: !lambda 'return !(id(g_who_present)[2] && 2!=id(g_who_sel) && !id(g_who_haspic)[2]);', x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(2-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(2-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.label.update: { id: who_in2, text: !lambda 'return id(g_who_initial)[2];' }
            - lvgl.widget.update: { id: who_ph3, hidden: !lambda 'return !(id(g_who_present)[3] && 3!=id(g_who_sel) && id(g_who_haspic)[3]);',  x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(3-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(3-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.widget.update: { id: who_ci3, hidden: !lambda 'return !(id(g_who_present)[3] && 3!=id(g_who_sel) && !id(g_who_haspic)[3]);', x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(3-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(3-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.label.update: { id: who_in3, text: !lambda 'return id(g_who_initial)[3];' }
            - lvgl.widget.update: { id: who_ph4, hidden: !lambda 'return !(id(g_who_present)[4] && 4!=id(g_who_sel) && id(g_who_haspic)[4]);',  x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(4-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(4-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.widget.update: { id: who_ci4, hidden: !lambda 'return !(id(g_who_present)[4] && 4!=id(g_who_sel) && !id(g_who_haspic)[4]);', x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(4-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(4-id(g_who_sel))*6.2831853f/n));' }
            - lvgl.label.update: { id: who_in4, text: !lambda 'return id(g_who_initial)[4];' }
            - lvgl.widget.update: { id: who_ph5, hidden: !lambda 'return !(id(g_who_present)[5] && 5!=id(g_who_sel) && id(g_who_haspic)[5]);',  x: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(118.0f*sinf((float)(5-id(g_who_sel))*6.2831853f/n));', y: !lambda 'int n=0;for(int k=0;k<6;k++)if(id(g_who_present)[k])n++;if(n<1)n=1;return (int)lroundf(-118.0f*cosf((float)(5-id(g_who_sel))*6.2831853f/n));' }
