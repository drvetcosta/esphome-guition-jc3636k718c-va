    on_value: [ lambda: 'std::string u=x; if(!u.empty() && u.rfind("http",0)!=0) u=std::string("${ha_base_url}")+u; if(id(g_who_custom)[2]) return; id(g_who_pic)[2]=u; id(g_who_haspic)[2]=!u.empty(); if(!u.empty()){ id(who_img2)->set_url(u.c_str()); id(who_img2)->update(); }', script.execute: who_render ]
