interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==9;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true;'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_who, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_who, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_who, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_who, animation: move_bottom, time: 250ms }] }
            - script.execute: who_load_big
            - script.execute: who_render
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==9;' }
          then:
            - lambda: |-
                int n = 0; for (int i = 0; i < 6; i++) if (id(g_who_present)[i]) n++;
                id(g_knob_capture) = (n > 1);
            - if:
                condition: { lambda: 'return id(g_knob_delta) != 0;' }
                then:
                  - lambda: |-
                      int d = id(g_knob_delta); id(g_knob_delta) = 0;
                      int cnt = 0; for (int i = 0; i < 6; i++) if (id(g_who_present)[i]) cnt++;
                      if (cnt > 0) {
                        int step = (d > 0) ? 1 : -1; int n = (d > 0) ? d : -d;
                        for (int k = 0; k < n; k++) { do { id(g_who_sel) = (id(g_who_sel) + step + 6) % 6; } while (!id(g_who_present)[id(g_who_sel)]); }
                      }
                  - script.execute: who_load_big
                  - script.execute: who_render

