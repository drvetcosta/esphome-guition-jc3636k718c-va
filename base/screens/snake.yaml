          for (int i = 0; i < 10; i++) {
            if (s > id(g_sn_top)[i]) {
              for (int j = 9; j > i; j--) id(g_sn_top)[j] = id(g_sn_top)[j-1];
              id(g_sn_top)[i] = s;
              break;
            }
          }
      - script.execute: sn_screen
