                        - if: { condition: { lambda: 'return id(g_sn_del) == 50;' }, then: [ lvgl.widget.hide: sn_seg50 ] }
                        - if: { condition: { lambda: 'return id(g_sn_del) == 51;' }, then: [ lvgl.widget.hide: sn_seg51 ] }
                        - if: { condition: { lambda: 'return id(g_sn_del) == 52;' }, then: [ lvgl.widget.hide: sn_seg52 ] }
                        - if: { condition: { lambda: 'return id(g_sn_del) == 53;' }, then: [ lvgl.widget.hide: sn_seg53 ] }
                        - if: { condition: { lambda: 'return id(g_sn_del) == 54;' }, then: [ lvgl.widget.hide: sn_seg54 ] }
                        - if: { condition: { lambda: 'return id(g_sn_del) == 55;' }, then: [ lvgl.widget.hide: sn_seg55 ] }
                  - lvgl.widget.update: { id: sn_head, hidden: false, x: !lambda 'return (int) lroundf(id(g_sn_hx));', y: !lambda 'return (int) lroundf(id(g_sn_hy));' }
                  - script.execute: sn_items
                  - script.execute: sn_hud

