# Snake - optional carousel screen (base id 9). Free 360-degree snake steered by the knob.
# Remove it: drop this file from your config's package "files:" list. Nothing else to edit.
# Scores (g_sn_top / g_sn_best) + the "Reset scores" settings action live here - fully self-contained.
#
# GENERATED by scripts/gen_snake.py - edit the generator, not the blocks. Body = a trail of dots
# (ring buffer) so per-tick render cost is constant regardless of length (keeps the knob responsive).

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[9] = true;'
    - priority: 650
      then:
        - lambda: |-
            int g = id(g_wgrp_n)++;
            id(g_wgrp_labels) += (g ? "\n" : ""); id(g_wgrp_labels) += "Snake";
            int o = id(g_wopt_n)++;
            id(g_wopt_group)[o] = g; id(g_wopt_label)[o] = "Reset scores"; id(g_wopt_kind)[o] = 1; id(g_wopt_ptr)[o] = &id(g_sn_reset);

globals:
  - id: g_sn_best
    type: int
    restore_value: yes
    initial_value: '0'
  - id: g_sn_top
    type: int[10]
    restore_value: yes
  - id: g_sn_reset
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_sn_state    # 0=menu 1=playing 2=game over 3=how-to 4=scores
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_len      # body dots in the snake
    type: int
    restore_value: no
    initial_value: '5'
  - id: g_sn_score
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_tx       # body trail dots X (ring buffer; centre coords px)
    type: float[56]
    restore_value: no
  - id: g_sn_ty
    type: float[56]
    restore_value: no
  - id: g_sn_head     # ring index of the newest dot
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_hx       # smooth head position (leads the newest dot)
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_sn_hy
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_sn_ang      # heading (radians)
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: g_sn_grow     # pending growth (appends that won't drop the tail)
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_dead
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: g_sn_add      # ring slot to show/position this tick (-1 none)
    type: int
    restore_value: no
    initial_value: '-1'
  - id: g_sn_del      # ring slot to hide this tick (-1 none)
    type: int
    restore_value: no
    initial_value: '-1'
  # fruit slots
  - id: g_sn_fx
    type: float[3]
    restore_value: no
  - id: g_sn_fy
    type: float[3]
    restore_value: no
  - id: g_sn_fi
    type: int[3]
    restore_value: no
  - id: g_sn_fon
    type: bool[3]
    restore_value: no
  - id: g_sn_fclk
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_newfruit
    type: int
    restore_value: no
    initial_value: '-1'
  # skull slots
  - id: g_sn_skx
    type: float[2]
    restore_value: no
  - id: g_sn_sky
    type: float[2]
    restore_value: no
  - id: g_sn_skon
    type: bool[2]
    restore_value: no
  - id: g_sn_skage
    type: int[2]
    restore_value: no
  - id: g_sn_skclk
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_sn_newskull
    type: int
    restore_value: no
    initial_value: '-1'

