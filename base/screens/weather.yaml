# Weather - carousel screen (base id 5). GENERATED by scripts/gen_weather.py.
# A dial of forecast days around the rim (knob scrolls), animated condition icon + colour-coded
# temperature in the centre, a glow that slides to the selected day. Forecast comes from a Home
# Assistant helper sensor (see base/screens/weather.ha-helper.yaml). Remove: drop from `files:`.

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[5] = true;'
    - priority: 650
      then:
        - lambda: |-
            int g = id(g_wgrp_n)++;
            id(g_wgrp_labels) += (g ? "\n" : ""); id(g_wgrp_labels) += "Weather";
            int o = id(g_wopt_n)++;
            id(g_wopt_group)[o] = g; id(g_wopt_label)[o] = "Fahrenheit"; id(g_wopt_kind)[o] = 0; id(g_wopt_ptr)[o] = &id(g_wx_fahrenheit);

globals:
  # --- forecast data ---
  - id: g_wx_fahrenheit
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: g_wx_now
    type: int
    restore_value: no
    initial_value: '-127'
  - id: g_wx_state_cur
    type: std::string
    restore_value: no
  - id: g_wx_cond
    type: std::string[7]
    restore_value: no
  - id: g_wx_icon
    type: std::string[7]
    restore_value: no
  - id: g_wx_name
    type: std::string[7]
    restore_value: no
  - id: g_wx_hi
    type: int[7]
    restore_value: no
  - id: g_wx_lo
    type: int[7]
    restore_value: no
  - id: g_wx_n
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_wx_day
    type: int
    restore_value: no
    initial_value: '0'
  # --- render cache ---
  - id: g_wx_sel
    type: std::string
    restore_value: no
  - id: g_wx_tc
    type: int
    restore_value: no
    initial_value: '-127'
  - id: g_wx_lastcond
    type: std::string
    restore_value: no
  - id: g_wx_ikey
    type: std::string
    restore_value: no
  - id: g_wx_gpos
    type: float
    restore_value: no
    initial_value: '0.0'

