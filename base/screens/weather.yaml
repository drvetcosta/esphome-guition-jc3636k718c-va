# Weather - optional carousel screen (base id 5).
# A dial of forecast days: the day icons are spread evenly around the ring (however many
# days the forecast has), the selected day is highlighted, and the centre shows the day's
# full name, its temperatures and its condition. Turn the knob to move the highlight.
#
# The forecast comes from a Home Assistant helper sensor (HA no longer exposes the forecast
# as an attribute). Add base/screens/weather.ha-helper.yaml to your HA config; it publishes
# ${forecast_entity} as "condition,high,low,DayName|..." (one segment per day).
#
# Remove it: drop this file from your config's package "files:" list.

esphome:
  on_boot:
    - priority: 655
      then:
        - lambda: 'id(g_present)[5] = true;'   # register the weather screen

globals:
  - id: g_wx_now
    type: int
    restore_value: no
    initial_value: '-127'
  - id: g_wx_state_cur
    type: std::string
    restore_value: no
  - id: g_wx_cond
    type: std::string[7]
    restore_value: no
  - id: g_wx_icon
    type: std::string[7]
    restore_value: no
  - id: g_wx_name
    type: std::string[7]
    restore_value: no
  - id: g_wx_hi
    type: int[7]
    restore_value: no
  - id: g_wx_lo
    type: int[7]
    restore_value: no
  - id: g_wx_n
    type: int
    restore_value: no
    initial_value: '0'
  - id: g_wx_day
    type: int
    restore_value: no
    initial_value: '0'

font:
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: icons_wx
    size: 30
    bpp: 4
    glyphs: ["󰖙", "󰖔", "󰖕", "󰖑", "󰖝", "󰖓", "󰖖", "󰖗", "󰖘", "󰖐"]

script:
  - id: wx_render
    then:
      # centre: full day name
      - lvgl.label.update:
          id: wx_p_title
          text: !lambda |-
            int d = id(g_wx_day);
            if (d >= id(g_wx_n)) return std::string("");
            std::string s = id(g_wx_name)[d];
            if (s == "Mon") return std::string("Monday");
            if (s == "Tue") return std::string("Tuesday");
            if (s == "Wed") return std::string("Wednesday");
            if (s == "Thu") return std::string("Thursday");
            if (s == "Fri") return std::string("Friday");
            if (s == "Sat") return std::string("Saturday");
            if (s == "Sun") return std::string("Sunday");
            return s;
      # centre: temperatures (high / low)
      - lvgl.label.update:
          id: wx_p_temp
          text: !lambda |-
            int d = id(g_wx_day);
            bool f = id(g_wx_fahrenheit);                 // unit toggle lives in the core (Settings -> Widgets)
            char u = f ? 'F' : 'C';
            if (d >= id(g_wx_n)) {
              if (id(g_wx_now) > -100) {
                int n = id(g_wx_now); if (f) n = n * 9 / 5 + 32;
                char b[12]; snprintf(b, sizeof(b), "%d°%c", n, u); return std::string(b);
              }
              return std::string("--");
            }
            int hi = id(g_wx_hi)[d], lo = id(g_wx_lo)[d];
            if (f) { hi = hi * 9 / 5 + 32; lo = lo * 9 / 5 + 32; }
            char b[24]; snprintf(b, sizeof(b), "%d / %d °%c", hi, lo, u);
            return std::string(b);
      # centre: condition text
      - lvgl.label.update:
          id: wx_p_cond
          text: !lambda |-
            int d = id(g_wx_day);
            if (id(g_wx_n) <= 0) return std::string("Add the HA forecast helper");
            std::string s = (d < id(g_wx_n)) ? id(g_wx_cond)[d] : id(g_wx_state_cur);
            if (s == "sunny") return std::string("Sunny");
            if (s == "clear-night") return std::string("Clear");
            if (s == "partlycloudy") return std::string("Partly Cloudy");
            if (s == "cloudy") return std::string("Cloudy");
            if (s == "fog") return std::string("Fog");
            if (s == "rainy") return std::string("Rainy");
            if (s == "pouring") return std::string("Heavy Rain");
            if (s == "lightning" || s == "lightning-rainy") return std::string("Storm");
            if (s == "snowy" || s == "snowy-rainy") return std::string("Snow");
            if (s == "hail") return std::string("Hail");
            if (s == "windy" || s == "windy-variant") return std::string("Windy");
            if (s == "exceptional") return std::string("Severe");
            return s;
      # highlight ring behind the selected day's icon (position computed for n days)
      - lvgl.widget.update:
          id: wx_sel
          hidden: !lambda 'return id(g_wx_n) <= 0;'
          x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(id(g_wx_day) * 6.2831853f / n));'
          y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(id(g_wx_day) * 6.2831853f / n));'
      # day icons spread evenly around the ring
      - lvgl.widget.update: { id: wx_d0, hidden: !lambda 'return 0 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(0 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(0 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d0, text: !lambda 'return id(g_wx_n) > 0 ? id(g_wx_icon)[0] : std::string("");' }
      - lvgl.widget.update: { id: wx_d1, hidden: !lambda 'return 1 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(1 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(1 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d1, text: !lambda 'return id(g_wx_n) > 1 ? id(g_wx_icon)[1] : std::string("");' }
      - lvgl.widget.update: { id: wx_d2, hidden: !lambda 'return 2 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(2 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(2 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d2, text: !lambda 'return id(g_wx_n) > 2 ? id(g_wx_icon)[2] : std::string("");' }
      - lvgl.widget.update: { id: wx_d3, hidden: !lambda 'return 3 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(3 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(3 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d3, text: !lambda 'return id(g_wx_n) > 3 ? id(g_wx_icon)[3] : std::string("");' }
      - lvgl.widget.update: { id: wx_d4, hidden: !lambda 'return 4 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(4 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(4 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d4, text: !lambda 'return id(g_wx_n) > 4 ? id(g_wx_icon)[4] : std::string("");' }
      - lvgl.widget.update: { id: wx_d5, hidden: !lambda 'return 5 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(5 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(5 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d5, text: !lambda 'return id(g_wx_n) > 5 ? id(g_wx_icon)[5] : std::string("");' }
      - lvgl.widget.update: { id: wx_d6, hidden: !lambda 'return 6 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(120.0f * sinf(6 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-120.0f * cosf(6 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d6, text: !lambda 'return id(g_wx_n) > 6 ? id(g_wx_icon)[6] : std::string("");' }

sensor:
  - platform: homeassistant
    id: wx_now_temp
    entity_id: ${weather_entity}
    attribute: temperature
    on_value:
      - lambda: 'id(g_wx_now) = (int) roundf(x);'
      - script.execute: wx_render

text_sensor:
  - platform: homeassistant
    id: wx_now_state
    entity_id: ${weather_entity}
    on_value:
      - lambda: 'id(g_wx_state_cur) = x;'
      - script.execute: wx_render
  - platform: homeassistant
    id: wx_week
    entity_id: ${forecast_entity}
    on_value:
      - lambda: |-
          auto glyph = [](const std::string &s) -> std::string {
            if (s == "sunny") return std::string("󰖙");
            if (s == "clear-night") return std::string("󰖔");
            if (s == "partlycloudy") return std::string("󰖕");
            if (s == "fog") return std::string("󰖑");
            if (s == "windy" || s == "windy-variant") return std::string("󰖝");
            if (s == "lightning" || s == "lightning-rainy") return std::string("󰖓");
            if (s == "pouring") return std::string("󰖖");
            if (s == "rainy") return std::string("󰖗");
            if (s == "snowy" || s == "snowy-rainy" || s == "hail") return std::string("󰖘");
            return std::string("󰖐");
          };
          std::string s = x;
          for (int i = 0; i < 7; i++) { id(g_wx_icon)[i] = ""; id(g_wx_cond)[i] = ""; }
          int n = 0; size_t pos = 0;
          while (n < 7) {
            size_t bar = s.find('|', pos);
            std::string seg = (bar == std::string::npos) ? s.substr(pos) : s.substr(pos, bar - pos);
            size_t c1 = seg.find(',');
            if (c1 != std::string::npos) {
              size_t c2 = seg.find(',', c1 + 1);
              size_t c3 = (c2 != std::string::npos) ? seg.find(',', c2 + 1) : std::string::npos;
              if (c2 != std::string::npos && c3 != std::string::npos) {
                std::string cond = seg.substr(0, c1);
                id(g_wx_cond)[n] = cond;
                id(g_wx_icon)[n] = glyph(cond);
                id(g_wx_hi)[n] = atoi(seg.substr(c1 + 1, c2 - c1 - 1).c_str());
                id(g_wx_lo)[n] = atoi(seg.substr(c2 + 1, c3 - c2 - 1).c_str());
                id(g_wx_name)[n] = seg.substr(c3 + 1);
                n++;
              }
            }
            if (bar == std::string::npos) break;
            pos = bar + 1;
          }
          id(g_wx_n) = n;
          if (id(g_wx_day) >= n) id(g_wx_day) = 0;
      - script.execute: wx_render

interval:
  - interval: 50ms
    then:
      - if:
          condition: { lambda: 'return id(g_nav_req) && id(g_base)==5;' }
          then:
            - lambda: 'id(g_nav_req) = false; id(g_knob_capture) = true; id(g_wx_day) = 0;'
            - if: { condition: { lambda: 'return id(g_nav_anim)==0;' }, then: [lvgl.page.show: { id: page_weather, animation: move_left,   time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==1;' }, then: [lvgl.page.show: { id: page_weather, animation: move_right,  time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==2;' }, then: [lvgl.page.show: { id: page_weather, animation: move_top,    time: 250ms }] }
            - if: { condition: { lambda: 'return id(g_nav_anim)==3;' }, then: [lvgl.page.show: { id: page_weather, animation: move_bottom, time: 250ms }] }
            - script.execute: wx_render
  - interval: 120ms
    then:
      - if:
          condition: { lambda: 'return id(g_base)==5 && id(g_knob_delta) != 0;' }
          then:
            - lambda: |-
                id(g_wx_day) += id(g_knob_delta); id(g_knob_delta) = 0;
                int mx = (id(g_wx_n) > 0) ? id(g_wx_n) - 1 : 0;
                if (id(g_wx_day) < 0) id(g_wx_day) = 0;
                if (id(g_wx_day) > mx) id(g_wx_day) = mx;
            - script.execute: wx_render

lvgl:
  pages:
    - id: page_weather
      bg_color: 0x0B1020
      widgets:
        # highlight behind the selected icon (moved in wx_render)
        - obj:
            id: wx_sel
            align: CENTER
            x: 0
            y: -120
            width: 44
            height: 44
            radius: 22
            bg_color: 0x2A6BD4
            bg_opa: 45%
            border_width: 2
            border_color: 0x6FA8FF
            hidden: true
        # day icons (positions + glyphs set in wx_render)
        - label: { id: wx_d0, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xFFE08A, hidden: true }
        - label: { id: wx_d1, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xFFE08A, hidden: true }
        - label: { id: wx_d2, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xFFE08A, hidden: true }
        - label: { id: wx_d3, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xFFE08A, hidden: true }
        - label: { id: wx_d4, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xFFE08A, hidden: true }
        - label: { id: wx_d5, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xFFE08A, hidden: true }
        - label: { id: wx_d6, align: CENTER, x: 0, y: 0, text: "", text_font: icons_wx, text_color: 0xFFE08A, hidden: true }
        # centre stack: day name / temperatures / condition
        - label: { id: wx_p_title, align: CENTER, y: -34, text: "", text_font: font_sel, text_color: 0x9FC7BE }
        - label: { id: wx_p_temp, align: CENTER, y: 4, text: "--", text_font: montserrat_34, text_color: 0xFFFFFF }
        - label: { id: wx_p_cond, align: CENTER, y: 44, text: "", text_font: font_med, text_color: 0x5FF0D9 }
