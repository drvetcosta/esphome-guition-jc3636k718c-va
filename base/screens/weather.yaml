script:
  - id: wx_render
    then:
      - lambda: |-
          int d = id(g_wx_day);
          bool has = (id(g_wx_n) > 0 && d < id(g_wx_n));
          id(g_wx_sel) = has ? id(g_wx_cond)[d] : id(g_wx_state_cur);
          id(g_wx_tc)  = has ? id(g_wx_hi)[d] : id(g_wx_now);
      - lvgl.label.update:
          id: wx_day
          text: !lambda |-
            int d = id(g_wx_day);
            if (id(g_wx_n) <= 0 || d >= id(g_wx_n)) return std::string("TODAY");
            std::string s = id(g_wx_name)[d];
            if (s == "Mon") return std::string("MONDAY");
            if (s == "Tue") return std::string("TUESDAY");
            if (s == "Wed") return std::string("WEDNESDAY");
            if (s == "Thu") return std::string("THURSDAY");
            if (s == "Fri") return std::string("FRIDAY");
            if (s == "Sat") return std::string("SATURDAY");
            if (s == "Sun") return std::string("SUNDAY");
            return s;
      - lvgl.label.update:
          id: wx_temp
          text: !lambda |-
            int d = id(g_wx_day);
            bool f = id(g_wx_fahrenheit);
            char u = f ? 'F' : 'C';
            if (id(g_wx_n) <= 0 || d >= id(g_wx_n)) {
              if (id(g_wx_now) > -100) { int n = id(g_wx_now); if (f) n = n*9/5+32; char b[12]; snprintf(b,sizeof(b),"%d°%c",n,u); return std::string(b); }
              return std::string("--");
            }
            int hi = id(g_wx_hi)[d], lo = id(g_wx_lo)[d];
            if (f) { hi = hi*9/5+32; lo = lo*9/5+32; }
            char b[24]; snprintf(b,sizeof(b),"%d° / %d°",hi,lo); return std::string(b);
      - lvgl.label.update:
          id: wx_cond
          text: !lambda |-
            if (id(g_wx_n) <= 0) return std::string("Add the HA forecast helper");
            std::string s = id(g_wx_sel);
            if (s == "sunny") return std::string("Sunny");
            if (s == "clear-night") return std::string("Clear");
            if (s == "partlycloudy") return std::string("Partly Cloudy");
            if (s == "cloudy") return std::string("Cloudy");
            if (s == "fog") return std::string("Fog");
            if (s == "rainy") return std::string("Rainy");
            if (s == "pouring") return std::string("Heavy Rain");
            if (s == "lightning" || s == "lightning-rainy") return std::string("Storm");
            if (s == "snowy" || s == "snowy-rainy") return std::string("Snow");
            if (s == "hail") return std::string("Hail");
            if (s == "windy" || s == "windy-variant") return std::string("Windy");
            if (s == "exceptional") return std::string("Severe");
            return s;
      - if:
          condition: { lambda: 'return id(g_wx_sel) != id(g_wx_lastcond);' }
          then:
            - lambda: |-
                id(g_wx_lastcond) = id(g_wx_sel);
                std::string s = id(g_wx_sel), k;
                if (s == "sunny") k = "sun";
                else if (s == "clear-night") k = "moon";
                else if (s == "partlycloudy") k = "partly";
                else if (s == "rainy" || s == "pouring") k = "rain";
                else if (s == "lightning" || s == "lightning-rainy") k = "storm";
                else if (s == "snowy" || s == "snowy-rainy" || s == "hail") k = "snow";
                else k = "cloud";
                id(g_wx_ikey) = k;
            - lvgl.animimg.stop: wx_a_sun
            - lvgl.animimg.stop: wx_a_partly
            - lvgl.animimg.stop: wx_a_moon
            - lvgl.animimg.stop: wx_a_cloud
            - lvgl.animimg.stop: wx_a_rain
            - lvgl.animimg.stop: wx_a_storm
            - lvgl.animimg.stop: wx_a_snow
            - lvgl.widget.hide: wx_a_sun
            - lvgl.widget.hide: wx_a_partly
            - lvgl.widget.hide: wx_a_moon
            - lvgl.widget.hide: wx_a_cloud
            - lvgl.widget.hide: wx_a_rain
            - lvgl.widget.hide: wx_a_storm
            - lvgl.widget.hide: wx_a_snow
            - if: { condition: { lambda: 'return id(g_wx_ikey) == "sun";' }, then: [ lvgl.widget.show: wx_a_sun, lvgl.animimg.start: wx_a_sun ] }
            - if: { condition: { lambda: 'return id(g_wx_ikey) == "partly";' }, then: [ lvgl.widget.show: wx_a_partly, lvgl.animimg.start: wx_a_partly ] }
            - if: { condition: { lambda: 'return id(g_wx_ikey) == "moon";' }, then: [ lvgl.widget.show: wx_a_moon, lvgl.animimg.start: wx_a_moon ] }
            - if: { condition: { lambda: 'return id(g_wx_ikey) == "cloud";' }, then: [ lvgl.widget.show: wx_a_cloud, lvgl.animimg.start: wx_a_cloud ] }
            - if: { condition: { lambda: 'return id(g_wx_ikey) == "rain";' }, then: [ lvgl.widget.show: wx_a_rain, lvgl.animimg.start: wx_a_rain ] }
            - if: { condition: { lambda: 'return id(g_wx_ikey) == "storm";' }, then: [ lvgl.widget.show: wx_a_storm, lvgl.animimg.start: wx_a_storm ] }
            - if: { condition: { lambda: 'return id(g_wx_ikey) == "snow";' }, then: [ lvgl.widget.show: wx_a_snow, lvgl.animimg.start: wx_a_snow ] }
      - lvgl.widget.update: { id: wx_glow, hidden: !lambda 'return id(g_wx_n) <= 0;' }
      - lvgl.widget.update: { id: wx_d0, hidden: !lambda 'return 0 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(0 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(0 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d0, text: !lambda 'return id(g_wx_n) > 0 ? id(g_wx_icon)[0] : std::string("");' }
      - lvgl.widget.update: { id: wx_d1, hidden: !lambda 'return 1 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(1 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(1 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d1, text: !lambda 'return id(g_wx_n) > 1 ? id(g_wx_icon)[1] : std::string("");' }
      - lvgl.widget.update: { id: wx_d2, hidden: !lambda 'return 2 >= id(g_wx_n);', x: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(140.0f * sinf(2 * 6.2831853f / n));', y: !lambda 'int n=id(g_wx_n); if(n<1)n=1; return (int) lroundf(-140.0f * cosf(2 * 6.2831853f / n));' }
      - lvgl.label.update:  { id: wx_d2, text: !lambda 'return id(g_wx_n) > 2 ? id(g_wx_icon)[2] : std::string("");' }
